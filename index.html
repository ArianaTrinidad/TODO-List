<!DOCTYPE html>
<html>
<head>
  <title>TODO App</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-image: url("https://es.dreamstime.com/encantador-patr%C3%B3n-de-terrazo-con-formas-irregulares-y-divertidas-en-una-paleta-colores-apagados-image422370333");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      margin: 0;
      padding: 20px;
    }

    h1 {
      color: #264653;
    }

    input {
      padding: 10px;
      width: 250px;
      border: none;
      border-radius: 8px;
      margin-right: 10px;
    }

    button {
      padding: 10px 15px;
      border: none;
      border-radius: 8px;
      background-color: #e76f51;
      color: white;
      cursor: pointer;
    }

    #todoList {
      margin-top: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 15px;
    }

    .card {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(5px);
      border-radius: 12px;
      padding: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    .text {
      margin-bottom: 10px;
    }

    .expand-btn {
      font-size: 12px;
      background: rgba(0,0,0,0.2);
      border-radius: 6px;
      padding: 5px;
      cursor: pointer;
      display: inline-block;
    }
  </style>
</head>

<body>

  <h1>TODOs</h1>

  <input id="todoInput" placeholder="Nuevo TODO" />
  <button onclick="addTodo()">Agregar</button>

  <div id="todoList"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <script>
    const SUPABASE_URL = "https://uxrnqrzbtjhtehyjthhu.supabase.co";
    const SUPABASE_KEY = "sb_publishable_jfLi4UlQrlXFhoFzfwVQxQ_QMY4fYO_";

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    function truncate(text, maxLength = 40) {
      return text.length > maxLength
        ? text.substring(0, maxLength) + "..."
        : text;
    }

    async function loadTodos() {
      const { data } = await supabase
        .from('todos')
        .select('*')
        .order('created_at', { ascending: false });

      const list = document.getElementById("todoList");
      list.innerHTML = "";

      data.forEach(todo => {
        let expanded = false;

        const card = document.createElement("div");
        card.className = "card";

        const text = document.createElement("div");
        text.className = "text";
        text.textContent = truncate(todo.text);

        const btn = document.createElement("div");
        btn.className = "expand-btn";
        btn.textContent = "Ver más";

        btn.onclick = () => {
          expanded = !expanded;
          text.textContent = expanded ? todo.text : truncate(todo.text);
          btn.textContent = expanded ? "Ver menos" : "Ver más";
        };

        card.appendChild(text);
        card.appendChild(btn);
        list.appendChild(card);
      });
    }

    async function addTodo() {
      const input = document.getElementById("todoInput");
      const text = input.value;

      if (!text) return;

      await supabase.from('todos').insert([{ text }]);

      input.value = "";
      loadTodos();
    }

    loadTodos();
  </script>

</body>
</html>
